version: '3.9'

services:

  # ─────────────────────────────────────────
  # MySQL
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: laravel_builder_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_builder}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_builder_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: laravel_builder_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_builder_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MinIO (almacenamiento compatible S3)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: laravel_builder_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    networks:
      - laravel_builder_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────
  # MinIO — Creación automática de buckets
  # ─────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: laravel_builder_minio_init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/uploads;
        mc mb --ignore-existing local/projects;
        mc anonymous set download local/projects;
        exit 0;
      "
    networks:
      - laravel_builder_network

  # ─────────────────────────────────────────
  # Ollama (IA local — DeepSeek / Qwen / Gemma)
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: laravel_builder_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - laravel_builder_network

  # ─────────────────────────────────────────
  # Backend — Laravel 12
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_builder_backend
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel_builder_network
    command: >
      sh -c "composer install --no-interaction --optimize-autoloader &&
             php artisan migrate --force --no-interaction &&
             php artisan serve --host=0.0.0.0 --port=8000"

  # ─────────────────────────────────────────
  # Queue Worker — Laravel
  # ─────────────────────────────────────────
  queue_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_builder_queue
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    depends_on:
      - backend
      - redis
    networks:
      - laravel_builder_network
    command: php artisan queue:work redis --timeout=360 --sleep=3 --tries=3 --max-time=3600

  # ─────────────────────────────────────────
  # Frontend — Next.js
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laravel_builder_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - laravel_builder_network

# ─────────────────────────────────────────
# Volúmenes persistentes
# ─────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  ollama_data:
    driver: local

# ─────────────────────────────────────────
# Red interna
# ─────────────────────────────────────────
networks:
  laravel_builder_network:
    driver: bridge
